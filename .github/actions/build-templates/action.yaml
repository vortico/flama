name: Build templates
description: >
  Authenticate to GCP via Workload Identity Federation and build the private
  @vortico/ui templates from source into lib/templates. Strict by design: used by
  release artifact jobs that must bundle the real templates, so it fails loudly
  when credentials are missing.

inputs:
  gcp-workload-identity-provider:
    description: GCP Workload Identity Provider resource.
    required: true
  gcp-service-account:
    description: GCP service account email to impersonate.
    required: true

runs:
  using: composite
  steps:
    - name: Set up Node
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: 22

    - name: Enable Corepack
      shell: bash
      run: corepack enable

    - name: Authenticate to Google Cloud
      id: auth
      uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
      with:
        token_format: access_token
        workload_identity_provider: ${{ inputs.gcp-workload-identity-provider }}
        service_account: ${{ inputs.gcp-service-account }}

    - name: Build templates
      shell: bash
      run: ./scripts/build --no-build-core --build-templates
      env:
        ARTIFACT_REGISTRY_TOKEN: ${{ steps.auth.outputs.access_token }}
