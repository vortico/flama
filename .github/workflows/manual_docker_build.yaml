name: Manual Docker Multi-Arch Build

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  DEFAULT_LINUX: "slim"
  DEFAULT_SCHEMAS: "pydantic"

jobs:
  get_version:
    name: Get PyPI Version
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      major_version: ${{ steps.fetch.outputs.major_version }}
      minor_version: ${{ steps.fetch.outputs.minor_version }}
    steps:
      - id: fetch
        run: curl -s https://pypi.org/pypi/flama/json | jq -r '.info.version | split(".") | "major_version=\(.[0])\nminor_version=\(.[1])"' >> "$GITHUB_OUTPUT"

  config:
    name: Config
    uses: ./.github/workflows/_python-versions.yaml

  docker_push_manual:
    name: Manual Docker Push (${{ matrix.linux }}, ${{ matrix.python }}, ${{ matrix.schemas }})
    needs: [get_version, config]
    environment:
      name: dockerhub
      url: https://hub.docker.com/r/vortico/flama
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      # Don't let one image's transient failure (e.g. a Docker Hub registry timeout) cancel the
      # other matrix builds — each tag is independent and re-runnable on its own.
      fail-fast: false
      matrix:
        linux: ["slim"]
        python: ${{ fromJSON(needs.config.outputs.versions) }}
        schemas: ["pydantic", "marshmallow", "typesystem"]
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - name: Log in to Docker Hub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/flama
          flavor: |
            latest=false
          tags: |
            type=raw,enable=true,value=${{ matrix.linux }}-${{ needs.get_version.outputs.major_version }}.${{ needs.get_version.outputs.minor_version }}-python${{ matrix.python }}-${{ matrix.schemas }}
            type=raw,enable=true,value=${{ matrix.linux }}-latest-python${{ matrix.python }}-${{ matrix.schemas }}
            type=raw,enable=${{ matrix.python == needs.config.outputs.default && 'true' || 'false' }},value=${{ matrix.linux }}-${{ needs.get_version.outputs.major_version }}.${{ needs.get_version.outputs.minor_version }}-${{ matrix.schemas }}
            type=raw,enable=${{ matrix.python == needs.config.outputs.default && 'true' || 'false' }},value=${{ matrix.linux }}-latest-${{ matrix.schemas }}
            type=raw,enable=${{ matrix.linux == env.DEFAULT_LINUX && 'true' || 'false' }},value=${{ needs.get_version.outputs.major_version }}.${{ needs.get_version.outputs.minor_version }}-python${{ matrix.python }}-${{ matrix.schemas }}
            type=raw,enable=${{ matrix.linux == env.DEFAULT_LINUX && 'true' || 'false' }},value=latest-python${{ matrix.python }}-${{ matrix.schemas }}
            type=raw,enable=${{ matrix.schemas == env.DEFAULT_SCHEMAS && 'true' || 'false' }},value=${{ matrix.linux }}-${{ needs.get_version.outputs.major_version }}.${{ needs.get_version.outputs.minor_version }}-python${{ matrix.python }}
            type=raw,enable=${{ matrix.schemas == env.DEFAULT_SCHEMAS && 'true' || 'false' }},value=${{ matrix.linux }}-latest-python${{ matrix.python }}
            type=raw,enable=${{ matrix.python == needs.config.outputs.default && (matrix.linux == env.DEFAULT_LINUX && 'true' || 'false') || 'false' }},value=latest-${{ matrix.schemas }}
            type=raw,enable=${{ matrix.linux == env.DEFAULT_LINUX && (matrix.schemas == env.DEFAULT_SCHEMAS && 'true' || 'false') || 'false' }},value=latest-python${{ matrix.python }}
            type=raw,enable=${{ matrix.python == needs.config.outputs.default && (matrix.schemas == env.DEFAULT_SCHEMAS && 'true' || 'false') || 'false' }},value=${{ matrix.linux }}-latest
            type=raw,enable=${{ matrix.linux == env.DEFAULT_LINUX && (matrix.python == needs.config.outputs.default && (matrix.schemas == env.DEFAULT_SCHEMAS && 'true' || 'false') || 'false') || 'false' }},value=latest
      - name: Build and push Docker image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          build-args: |
            PYTHON_VERSION=${{ matrix.python }}
            SCHEMAS_LIB=${{ matrix.schemas }}
          context: Dockerfiles/${{ matrix.linux }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
