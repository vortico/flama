name: Pull Request

on:
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  COMMENT_MARKER: "<!-- ci-status -->"

jobs:
  commitlint:
    name: Commit Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - name: Commit Linter
        uses: wagoid/commitlint-github-action@9763196e10f27aef304c9b8b660d31d97fce0f99 # v5

  config:
    name: Config
    uses: ./.github/workflows/_python-versions.yaml

  checks:
    name: Checks (${{ matrix.python }})
    needs: [config]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python: ${{ fromJSON(needs.config.outputs.versions) }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up uv
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6
        with:
          python-version: ${{ matrix.python }}
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: lib/core

      - id: format
        name: Code format checking
        run: ./scripts/format --check .

      - id: lint
        name: Code linting
        run: ./scripts/lint --output-format=github .

      - id: typecheck
        name: Static types check
        if: matrix.python >= '3.13'
        run: ./scripts/typecheck

    outputs:
      format: ${{ steps.format.outcome }}
      lint: ${{ steps.lint.outcome }}
      typecheck: ${{ steps.typecheck.outcome }}

  test:
    name: Test (${{ matrix.python }})
    needs: [config]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        python: ${{ fromJSON(needs.config.outputs.versions) }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up project
        uses: ./.github/actions/setup
        with:
          python-version: ${{ matrix.python }}
          gcp-workload-identity-provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          gcp-service-account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - id: tests
        name: Tests
        run: ./scripts/test

    outputs:
      tests: ${{ steps.tests.outcome }}

  performance:
    name: Performance
    needs: [config]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up project
        uses: ./.github/actions/setup
        with:
          python-version: ${{ needs.config.outputs.default }}
          gcp-workload-identity-provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          gcp-service-account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Run performance tests
        run: ./scripts/performance --output /tmp/performance-pr.json

      - name: Generate comparison
        run: ./scripts/benchmark --compare /tmp/performance-pr.json > /tmp/performance-comparison.md 2>&1 || true

      - name: Upload comparison
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: performance-comparison
          path: /tmp/performance-comparison.md

    outputs:
      result: ${{ job.status }}

  update-pr:
    name: Update PR
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [checks, test, performance]
    if: always()
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Download performance comparison
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: performance-comparison
          path: /tmp/performance
        continue-on-error: true

      - name: Post or update PR comment
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const fs = require('fs');
            const marker = '${{ env.COMMENT_MARKER }}';
            const sha = '${{ github.sha }}';
            const shortSha = sha.substring(0, 7);
            const timestamp = new Date().toISOString();

            const icon = (s) => s === 'success' ? '✅' : s === 'skipped' ? '⏭️' : '❌';
            const jobIcon = (s) => s === 'success' ? '✅' : s === 'skipped' ? '⏭️' : '❌';

            let performanceSection = '';
            try {
              const comparison = fs.readFileSync('/tmp/performance/performance-comparison.md', 'utf8').trim();
              if (comparison) {
                performanceSection = `\n<details>\n<summary>📊 Performance comparison</summary>\n\n${comparison}\n\n</details>\n`;
              }
            } catch (e) {
              core.info('No performance comparison available');
            }

            const lines = [
              marker,
              `📋 **Pull request status**`,
              ``,
              `| Step | Status |`,
              `| ---- | ------ |`,
              `| 🎨 Format | ${icon('${{ needs.checks.outputs.format }}')} |`,
              `| 🔍 Lint | ${icon('${{ needs.checks.outputs.lint }}')} |`,
              `| 🔍 Typecheck | ${icon('${{ needs.checks.outputs.typecheck }}')} |`,
              `| 🧪 Tests | ${jobIcon('${{ needs.test.result }}')} |`,
              `| 🏋️ Performance | ${jobIcon('${{ needs.performance.result }}')} |`,
              ``,
              `- **Commit:** \`${shortSha}\``,
              `- **Pushed by:** @${{ github.actor }}`,
              `- **Updated:** ${timestamp}`,
              performanceSection,
            ];

            const body = lines.join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
              core.info(`Updated existing comment ${existing.id}`);
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
              core.info(`Created new comment`);
            }
