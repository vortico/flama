name: Pull Request

on:
  pull_request:
    branches: [master]

env:
  COMMENT_MARKER: "<!-- ci-status -->"

jobs:
  commitlint:
    name: Commit Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Commit Linter
        uses: wagoid/commitlint-github-action@v5

  checks:
    name: Checks (${{ matrix.python }})
    needs: [commitlint]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: ${{ matrix.python }}
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - id: format
        name: Code format checking
        run: ./scripts/format --check .

      - id: lint
        name: Code linting
        run: ./scripts/lint --output-format=github .

      - id: typecheck
        name: Static types check
        if: matrix.python >= '3.13'
        run: ./scripts/typecheck

    outputs:
      format: ${{ steps.format.outcome }}
      lint: ${{ steps.lint.outcome }}
      typecheck: ${{ steps.typecheck.outcome }}

  test:
    name: Test (${{ matrix.python }})
    needs: [commitlint]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: ${{ matrix.python }}
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install project
        run: ./scripts/install

      - id: tests
        name: Tests
        run: ./scripts/test

    outputs:
      tests: ${{ steps.tests.outcome }}

  update-pr:
    name: Update PR
    runs-on: ubuntu-latest
    needs: [checks, test]
    if: always()
    permissions:
      pull-requests: write
    steps:
      - name: Post or update PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '${{ env.COMMENT_MARKER }}';
            const sha = '${{ github.sha }}';
            const shortSha = sha.substring(0, 7);
            const timestamp = new Date().toISOString();

            const icon = (s) => s === 'success' ? '✅' : s === 'skipped' ? '⏭️' : '❌';
            const jobIcon = (s) => s === 'success' ? '✅' : s === 'skipped' ? '⏭️' : '❌';

            const lines = [
              marker,
              `📋 **Pull request status**`,
              ``,
              `| Step | Status |`,
              `| ---- | ------ |`,
              `| 🎨 Format | ${icon('${{ needs.checks.outputs.format }}')} |`,
              `| 🔍 Lint | ${icon('${{ needs.checks.outputs.lint }}')} |`,
              `| 🔍 Typecheck | ${icon('${{ needs.checks.outputs.typecheck }}')} |`,
              `| 🧪 Tests | ${jobIcon('${{ needs.test.result }}')} |`,
              ``,
              `- **Commit:** \`${shortSha}\``,
              `- **Pushed by:** @${{ github.actor }}`,
              `- **Updated:** ${timestamp}`,
              ``,
            ];

            const body = lines.join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
              core.info(`Updated existing comment ${existing.id}`);
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
              core.info(`Created new comment`);
            }
