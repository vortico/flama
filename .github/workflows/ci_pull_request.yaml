name: Pull Request

on:
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  COMMENT_MARKER: "<!-- ci-status -->"

jobs:
  commitlint:
    name: Commit Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Commit Linter
        uses: wagoid/commitlint-github-action@b948419dd99f3fd78a6548d48f94e3df7f6bf3ed # v6.2.1

  config:
    name: Config
    uses: ./.github/workflows/_python-versions.yaml

  changes:
    name: Changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      performance: ${{ steps.filter.outputs.performance }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - id: filter
        name: Detect performance-relevant changes
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          # The performance suite is slow, so run it only when something that can move the numbers
          # changes: the framework, the Rust core, the perf tests/harness, or the locked dependency set.
          # Docs/CI-only PRs skip it.
          #
          # Three-dot (merge-base) diff: only count what THIS PR changed, not commits that landed on
          # master after the branch point. A two-dot diff would otherwise flag pyproject.toml/uv.lock
          # whenever the branch is merely behind a release and re-run the whole suite for nothing.
          if git diff --name-only "$BASE_SHA...$HEAD_SHA" |
            grep -qE '^(flama/|lib/|tests/performance/|scripts/performance$|scripts/benchmark$|pyproject\.toml$|uv\.lock$)'; then
            echo "performance=true" >> "$GITHUB_OUTPUT"
          else
            echo "performance=false" >> "$GITHUB_OUTPUT"
          fi

  templates:
    name: Templates
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
    outputs:
      # 'true' only when the artifact was built+uploaded (same-repo). Fork PRs skip the build, so
      # consumers fall back to fetching prebuilt templates from a published wheel.
      available: ${{ steps.mark.outputs.available }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Build templates
        id: build
        if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
        uses: ./.github/actions/build-templates
        with:
          gcp-workload-identity-provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          gcp-service-account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Upload templates
        if: ${{ steps.build.outcome == 'success' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: templates
          path: flama/_templates
          if-no-files-found: error
          retention-days: 1

      - id: mark
        shell: bash
        run: echo "available=${{ steps.build.outcome == 'success' }}" >> "$GITHUB_OUTPUT"

  checks:
    name: Checks (${{ matrix.python }})
    needs: [config]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python: ${{ fromJSON(needs.config.outputs.versions) }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: ${{ matrix.python }}
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          # Per-job suffix: `checks` and `test` build the same per-Python uv cache and would otherwise
          # race to save the same key (the "Unable to reserve cache" warning). Distinct suffixes split
          # them cleanly.
          cache-suffix: ${{ github.job }}

      # Only the typecheck step (>= 3.13) builds the Rust extension; format/lint run via `uvx ruff`
      # and need no toolchain. Skip Rust setup/cache on the other rows.
      - name: Set up Rust
        if: matrix.python >= '3.13'
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache Rust
        if: matrix.python >= '3.13'
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: lib/core

      - id: format
        name: Code format checking
        run: ./scripts/format --check .

      - id: lint
        name: Code linting
        run: ./scripts/lint --output-format=github .

      - id: typecheck
        name: Static types check
        if: matrix.python >= '3.13'
        run: ./scripts/typecheck

    outputs:
      format: ${{ steps.format.outcome }}
      lint: ${{ steps.lint.outcome }}
      typecheck: ${{ steps.typecheck.outcome }}

  test:
    name: Test (${{ matrix.python }})
    needs: [config, templates]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        python: ${{ fromJSON(needs.config.outputs.versions) }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Download templates
        if: ${{ needs.templates.outputs.available == 'true' }}
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: templates
          path: flama/_templates

      - name: Set up project
        uses: ./.github/actions/setup
        with:
          python-version: ${{ matrix.python }}
          gcp-workload-identity-provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          gcp-service-account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          # Reuse the prebuilt templates artifact when available; fork PRs fetch from a published wheel.
          templates: ${{ needs.templates.outputs.available == 'true' && 'skip' || 'fetch' }}

      - id: tests
        name: Tests
        run: ./scripts/test

    outputs:
      tests: ${{ steps.tests.outcome }}

  performance:
    name: Performance
    needs: [config, changes]
    # Skip on PRs that touch nothing performance-relevant (see the `changes` job). The `ci` gate
    # treats this job's "skipped" result as acceptable.
    if: needs.changes.outputs.performance == 'true'
    # Pinned (not ubuntu-latest): a stable OS + Valgrind version keeps the simulated cycle/instruction
    # counts reproducible across runs.
    runs-on: ubuntu-24.04
    # Valgrind adds heavy slowdown; instrumentation is off during import/setup, but the measured loops
    # are simulated, so the suite needs more headroom than a normal test job.
    timeout-minutes: 40
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up project
        uses: ./.github/actions/setup
        with:
          python-version: ${{ needs.config.outputs.default }}
          gcp-workload-identity-provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          gcp-service-account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          # Measure an optimized _core; a debug build would make instruction counts meaningless.
          release: "true"
          # The benchmarks don't render docs pages, so skip templates entirely (no Node/pnpm build).
          templates: "skip"

      - name: Install Valgrind
        # The runner image does not ship Valgrind. Try a direct install first (the image's apt cache is
        # usually fresh enough) and only fall back to a full `apt-get update` when that misses, trimming
        # ~20s off the common path.
        run: sudo apt-get install -y --no-install-recommends valgrind || { sudo apt-get update && sudo apt-get install -y --no-install-recommends valgrind; }

      - name: Run performance tests
        env:
          PYTHONHASHSEED: "0"
        run: ./scripts/performance --output /tmp/performance-pr.json

      - name: Generate comparison
        run: ./scripts/benchmark --compare /tmp/performance-pr.json > /tmp/performance-comparison.md 2>&1 || true

      - name: Upload comparison
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: performance-comparison
          path: /tmp/performance-comparison.md

    outputs:
      result: ${{ job.status }}

  ci:
    name: CI
    if: always()
    needs: [commitlint, config, changes, templates, checks, test, performance]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: All required jobs green?
        # "skipped" is acceptable so the conditionally-run performance job (see the `changes` job)
        # doesn't fail the gate; any job that actually ran must be "success".
        run: |
          for r in ${{ join(needs.*.result, ' ') }}; do
            case "$r" in
            success | skipped) ;;
            *)
              echo "A required job concluded '$r'."
              exit 1
              ;;
            esac
          done

  update-pr:
    name: Update PR
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [checks, test, performance]
    if: always()
    permissions:
      contents: read
      pull-requests: write
    steps:
      # Only when the performance job ran and produced the artifact. Attempting the download on PRs
      # where performance was skipped just emits a noisy "artifact not found" warning.
      - name: Download performance comparison
        if: needs.performance.result == 'success'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: performance-comparison
          path: /tmp/performance
        continue-on-error: true

      - name: Post or update PR comment
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const fs = require('fs');
            const marker = '${{ env.COMMENT_MARKER }}';
            const sha = '${{ github.sha }}';
            const shortSha = sha.substring(0, 7);
            const timestamp = new Date().toISOString();

            const icon = (s) => s === 'success' ? '✅' : s === 'skipped' ? '⏭️' : '❌';
            const jobIcon = (s) => s === 'success' ? '✅' : s === 'skipped' ? '⏭️' : '❌';

            let performanceSection = '';
            try {
              const comparison = fs.readFileSync('/tmp/performance/performance-comparison.md', 'utf8').trim();
              if (comparison) {
                performanceSection = `\n<details>\n<summary>📊 Performance comparison</summary>\n\n${comparison}\n\n</details>\n`;
              }
            } catch (e) {
              core.info('No performance comparison available');
            }

            const lines = [
              marker,
              `📋 **Pull request status**`,
              ``,
              `| Step | Status |`,
              `| ---- | ------ |`,
              `| 🎨 Format | ${icon('${{ needs.checks.outputs.format }}')} |`,
              `| 🔍 Lint | ${icon('${{ needs.checks.outputs.lint }}')} |`,
              `| 🔍 Typecheck | ${icon('${{ needs.checks.outputs.typecheck }}')} |`,
              `| 🧪 Tests | ${jobIcon('${{ needs.test.result }}')} |`,
              `| 🏋️ Performance | ${jobIcon('${{ needs.performance.result }}')} |`,
              ``,
              `- **Commit:** \`${shortSha}\``,
              `- **Pushed by:** @${{ github.actor }}`,
              `- **Updated:** ${timestamp}`,
              performanceSection,
            ];

            const body = lines.join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
              core.info(`Updated existing comment ${existing.id}`);
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
              core.info(`Created new comment`);
            }
