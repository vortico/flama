name: Production

on:
  push:
    branches:
      - master
    paths-ignore:
      - ".github/**"
      - "public/**"
      - "scripts/**"
      - "Dockerfiles/**"

concurrency:
  group: production
  cancel-in-progress: false

permissions:
  contents: read

env:
  DEFAULT_LINUX: "slim"
  DEFAULT_SCHEMAS: "pydantic"

jobs:
  commitlint:
    name: Commit Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Commit Linter
        uses: wagoid/commitlint-github-action@b948419dd99f3fd78a6548d48f94e3df7f6bf3ed # v6.2.1

  config:
    name: Config
    uses: ./.github/workflows/_python-versions.yaml

  templates:
    name: Templates
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
    outputs:
      available: ${{ steps.mark.outputs.available }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Build the private @vortico/ui templates once; every test/wheel/sdist/benchmark job downloads
      # this artifact instead of rebuilding (templates are arch-independent web assets).
      - name: Build templates
        id: build
        uses: ./.github/actions/build-templates
        with:
          gcp-workload-identity-provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          gcp-service-account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Upload templates
        if: ${{ steps.build.outcome == 'success' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: templates
          path: flama/_templates
          if-no-files-found: error
          retention-days: 1

      - id: mark
        shell: bash
        run: echo "available=${{ steps.build.outcome == 'success' }}" >> "$GITHUB_OUTPUT"

  checks:
    name: Checks (${{ matrix.python }})
    needs: [config]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python: ${{ fromJSON(needs.config.outputs.versions) }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: ${{ matrix.python }}
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          # Per-job suffix: `checks` and `test` build the same per-Python uv cache and would otherwise
          # race to save the same key (the "Unable to reserve cache" warning). Distinct suffixes split
          # them cleanly.
          cache-suffix: ${{ github.job }}

      # Only the typecheck step (>= 3.13) builds the Rust extension; format/lint run via `uvx ruff`
      # and need no toolchain. Skip Rust setup/cache on the other rows.
      - name: Set up Rust
        if: matrix.python >= '3.13'
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache Rust
        if: matrix.python >= '3.13'
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: lib/core

      - name: Code format checking
        run: ./scripts/format --check .

      - name: Code linting
        run: ./scripts/lint --output-format=github .

      - name: Static types check
        if: matrix.python >= '3.13'
        run: ./scripts/typecheck

  test:
    name: Test (${{ matrix.python }})
    needs: [config, templates]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        python: ${{ fromJSON(needs.config.outputs.versions) }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Download templates
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: templates
          path: flama/_templates

      - name: Set up project
        uses: ./.github/actions/setup
        with:
          python-version: ${{ matrix.python }}
          gcp-workload-identity-provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          gcp-service-account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          # Reuse the prebuilt templates artifact (push to master is always same-repo).
          templates: "skip"

      - name: Tests
        run: ./scripts/test

  release:
    name: Release
    needs: [commitlint, checks, test, config]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: pypi
    permissions:
      packages: write
      pull-requests: write
      contents: write
      issues: write
      id-token: write
    outputs:
      published: ${{ steps.semantic.outputs.new_release_published }}
      version: ${{ steps.semantic.outputs.new_release_version }}
      major_version: ${{ steps.semantic.outputs.new_release_major_version }}
      minor_version: ${{ steps.semantic.outputs.new_release_minor_version }}
      patch_version: ${{ steps.semantic.outputs.new_release_patch_version }}
    steps:
      # A GitHub App token (not GITHUB_TOKEN, which can't bypass branch protection) so
      # semantic-release can push the version-bump commit and tag to the protected master.
      - name: Generate a token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ vars.RELEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: ${{ needs.config.outputs.default }}
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - id: semantic
        name: Semantic Release
        uses: cycjimmy/semantic-release-action@b12c8f6015dc215fe37bc154d4ad456dd3833c90 # v6.0.0
        with:
          extra_plugins: |
            semantic-release-gitmoji
            @semantic-release/changelog
            @semantic-release/exec
            @semantic-release/git
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: New release published
        if: steps.semantic.outputs.new_release_published == 'true'
        run: |
          echo "New version: ${{ steps.semantic.outputs.new_release_version }}"

  benchmark:
    name: Benchmark
    needs: [release, config]
    if: needs.release.outputs.published == 'true'
    # Pinned (not ubuntu-latest) to match the PR performance job: a stable OS + Valgrind version
    # keeps the simulated cycle/instruction counts reproducible across releases.
    runs-on: ubuntu-24.04
    # Valgrind adds heavy slowdown; the measured loops are simulated, so this needs more headroom
    # than a normal job.
    timeout-minutes: 40
    permissions:
      contents: write
      id-token: write
    steps:
      # A GitHub App token (a branch-protection bypass actor) to push benchmark results to master.
      - name: Generate a token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ vars.RELEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: master
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Set up project
        uses: ./.github/actions/setup
        with:
          python-version: ${{ needs.config.outputs.default }}
          gcp-workload-identity-provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          gcp-service-account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          # Measure an optimized _core; a debug build would make instruction counts meaningless.
          release: "true"
          # The benchmarks don't render docs pages, so skip templates entirely (no Node/pnpm build).
          templates: "skip"

      - name: Install Valgrind
        # The runner image does not ship Valgrind. Try a direct install first (the image's apt cache is
        # usually fresh enough) and only fall back to a full `apt-get update` when that misses, trimming
        # ~20s off the common path.
        run: sudo apt-get install -y --no-install-recommends valgrind || { sudo apt-get update && sudo apt-get install -y --no-install-recommends valgrind; }

      - name: Run performance tests
        env:
          PYTHONHASHSEED: "0"
        run: ./scripts/performance --output "benchmarks/results/${{ needs.release.outputs.version }}.json"

      - name: Generate report
        run: ./scripts/benchmark

      # Commit benchmark results back to master. The [skip ci] tag prevents this push from
      # re-triggering the Production workflow (benchmarks/ is not in paths-ignore).
      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add benchmarks/
          git commit -m ":chart_with_upwards_trend: Add benchmark results for v${{ needs.release.outputs.version }} [skip ci]" || true
          git push

  build-wheels:
    name: Build wheels (${{ matrix.name }})
    needs: [release, config, templates]
    if: needs.release.outputs.published == 'true'
    strategy:
      fail-fast: false
      # The crate is not built against PyO3's stable ABI (abi3), so each wheel is tied to a
      # specific CPython version: one wheel per supported version (from the config job) per
      # platform. Linux rows build inside a manylinux/musllinux container that ships the
      # interpreters; host rows (macOS/Windows) install them via setup-python. This matrix only
      # declares platforms — the interpreter list is resolved in the "Resolve interpreters" step.
      matrix:
        include:
          - { name: linux-x86_64,      os: ubuntu-latest,  target: x86_64,  manylinux: auto,          host-python: false }
          - { name: linux-aarch64,     os: ubuntu-latest,  target: aarch64, manylinux: auto,          host-python: false }
          - { name: musllinux-x86_64,  os: ubuntu-latest,  target: x86_64,  manylinux: musllinux_1_2, host-python: false }
          - { name: musllinux-aarch64, os: ubuntu-latest,  target: aarch64, manylinux: musllinux_1_2, host-python: false }
          - { name: macos-x86_64,      os: macos-15-intel, target: x86_64,  manylinux: auto,          host-python: true }
          - { name: macos-aarch64,     os: macos-latest,   target: aarch64, manylinux: auto,          host-python: true }
          - { name: windows-x64,       os: windows-latest, target: x64,     manylinux: auto,          host-python: true }
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: master

      # Build maturin's -i flags from the supported versions: binary names on Linux/macOS
      # (python3.X), bare versions on Windows (resolved via the py launcher). `lines` feeds the
      # multiline python-version input of setup-python on host rows. A missing version fails the
      # release loudly rather than silently shipping fewer wheels.
      - name: Resolve interpreters
        id: interp
        shell: bash
        run: |
          v='${{ needs.config.outputs.versions }}'
          if [ "${{ runner.os }}" = "Windows" ]; then
            echo "args=-i $(jq -r 'join(" ")' <<<"$v")" >> "$GITHUB_OUTPUT"
          else
            echo "args=-i $(jq -r 'map("python" + .) | join(" ")' <<<"$v")" >> "$GITHUB_OUTPUT"
          fi
          { echo "lines<<EOF"; jq -r '.[]' <<<"$v"; echo EOF; } >> "$GITHUB_OUTPUT"

      # Host rows only (see host-python in the matrix): install every supported CPython so the
      # -i interpreters resolve.
      - name: Set up Python
        if: ${{ matrix.host-python }}
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ steps.interp.outputs.lines }}

      # Release artifacts must bundle the real @vortico/ui templates; reuse the prebuilt artifact from
      # the `templates` job instead of rebuilding here.
      - name: Download templates
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: templates
          path: flama/_templates

      - name: Build wheels
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist ${{ steps.interp.outputs.args }}
          manylinux: ${{ matrix.manylinux }}
          # Cache Rust compilation across releases (this is the only heavy Rust consumer with no cache;
          # the emulated aarch64/musl rows dominate release time). sccache uses the GitHub Actions cache.
          sccache: "true"

      - name: Upload wheels
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: wheels-${{ matrix.name }}
          path: dist/

  build-sdist:
    name: Build sdist
    needs: [release, templates]
    if: needs.release.outputs.published == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: master

      # Release artifacts must bundle the real @vortico/ui templates; reuse the prebuilt artifact from
      # the `templates` job instead of rebuilding here.
      - name: Download templates
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: templates
          path: flama/_templates

      - name: Build sdist
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1
        with:
          command: sdist
          args: --out dist

      - name: Upload sdist
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sdist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: pypi
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: master

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist/
          merge-multiple: true

      # `uv publish` uses PyPI Trusted Publishing (OIDC) via the `pypi` environment + id-token; the
      # PyPI trusted-publisher config (workflow file + environment) is unchanged from the previous
      # maturin upload, so no PyPI-side change is needed.
      - name: Publish to PyPI
        run: ./scripts/publish

  docker_push:
    name: Docker Push (${{ matrix.linux }}, ${{ matrix.python }}, ${{ matrix.schemas }})
    needs: [release, publish, config]
    if: needs.release.outputs.published == 'true'
    # No environment `url:` here on purpose: the `dockerhub` environment holds secrets, so GitHub
    # refuses to publish a URL for it and warns on every matrix job. The link added nothing.
    environment: dockerhub
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      # Don't let one image's transient failure (e.g. a Docker Hub registry timeout) cancel the
      # other matrix builds — each tag is independent and re-runnable on its own.
      fail-fast: false
      matrix:
        linux: ["slim"]
        python: ${{ fromJSON(needs.config.outputs.versions) }}
        schemas: ["pydantic", "marshmallow", "typesystem"]
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to Docker Hub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/flama
          flavor: |
            latest=false
          tags: |
            type=raw,enable=true,value=${{ matrix.linux }}-${{ needs.release.outputs.major_version }}.${{ needs.release.outputs.minor_version }}-python${{ matrix.python }}-${{ matrix.schemas }}
            type=raw,enable=true,value=${{ matrix.linux }}-latest-python${{ matrix.python }}-${{ matrix.schemas }}
            type=raw,enable=${{ matrix.python == needs.config.outputs.default && 'true' || 'false' }},value=${{ matrix.linux }}-${{ needs.release.outputs.major_version }}.${{ needs.release.outputs.minor_version }}-${{ matrix.schemas }}
            type=raw,enable=${{ matrix.python == needs.config.outputs.default && 'true' || 'false' }},value=${{ matrix.linux }}-latest-${{ matrix.schemas }}
            type=raw,enable=${{ matrix.linux == env.DEFAULT_LINUX && 'true' || 'false' }},value=${{ needs.release.outputs.major_version }}.${{ needs.release.outputs.minor_version }}-python${{ matrix.python }}-${{ matrix.schemas }}
            type=raw,enable=${{ matrix.linux == env.DEFAULT_LINUX && 'true' || 'false' }},value=latest-python${{ matrix.python }}-${{ matrix.schemas }}
            type=raw,enable=${{ matrix.schemas == env.DEFAULT_SCHEMAS && 'true' || 'false' }},value=${{ matrix.linux }}-${{ needs.release.outputs.major_version }}.${{ needs.release.outputs.minor_version }}-python${{ matrix.python }}
            type=raw,enable=${{ matrix.schemas == env.DEFAULT_SCHEMAS && 'true' || 'false' }},value=${{ matrix.linux }}-latest-python${{ matrix.python }}
            type=raw,enable=${{ matrix.python == needs.config.outputs.default && (matrix.linux == env.DEFAULT_LINUX && 'true' || 'false') || 'false' }},value=latest-${{ matrix.schemas }}
            type=raw,enable=${{ matrix.linux == env.DEFAULT_LINUX && (matrix.schemas == env.DEFAULT_SCHEMAS && 'true' || 'false') || 'false' }},value=latest-python${{ matrix.python }}
            type=raw,enable=${{ matrix.python == needs.config.outputs.default && (matrix.schemas == env.DEFAULT_SCHEMAS && 'true' || 'false') || 'false' }},value=${{ matrix.linux }}-latest
            type=raw,enable=${{ matrix.linux == env.DEFAULT_LINUX && (matrix.python == needs.config.outputs.default && (matrix.schemas == env.DEFAULT_SCHEMAS && 'true' || 'false') || 'false') || 'false' }},value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          build-args: |
            PYTHON_VERSION=${{ matrix.python }}
            SCHEMAS_LIB=${{ matrix.schemas }}
          context: Dockerfiles/${{ matrix.linux }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Run-over-run layer cache, scoped per tag combination so the 15 matrix builds don't clobber
          # each other's cache. Helps most with the emulated arm64 layers.
          cache-from: type=gha,scope=${{ matrix.linux }}-${{ matrix.python }}-${{ matrix.schemas }}
          cache-to: type=gha,mode=max,scope=${{ matrix.linux }}-${{ matrix.python }}-${{ matrix.schemas }}
