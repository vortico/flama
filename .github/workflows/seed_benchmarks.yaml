name: Seed Benchmarks

# One-off, manually-triggered (re)seed of the committed benchmark history. Performance must be
# measured on native x86_64 (Valgrind cannot run under qemu emulation), so this runs on a CI runner.
# It writes exactly two files and the report, then commits with [skip ci] so the push never triggers
# a release:
#   - benchmarks/results/2.0.0.json   ← current build (release _core), full suite
#   - benchmarks/results/baseline.json ← flama 1.12.4 from PyPI, overlapping subset
#   - benchmarks/README.md             ← regenerated (Comparison: 2.0.0 vs baseline)
# This is intended to be run once and then deleted.

on:
  workflow_dispatch: {}

concurrency:
  group: seed-benchmarks
  cancel-in-progress: false

permissions:
  contents: read

env:
  # Older release used as the historical baseline.
  OLD_VERSION: "1.12.4"

jobs:
  config:
    name: Config
    uses: ./.github/workflows/_python-versions.yaml

  seed:
    name: Seed benchmark history
    needs: [config]
    # Pinned (not ubuntu-latest) to match the other performance jobs: a stable OS + Valgrind version
    # keeps the simulated cycle/instruction counts reproducible.
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    permissions:
      contents: write
      id-token: write
    env:
      PYVER: ${{ needs.config.outputs.default }}
      # Stable hashing → stable instruction stream (the harness also sets this per measurement).
      PYTHONHASHSEED: "0"
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN }}

      - name: Set up project
        uses: ./.github/actions/setup
        with:
          python-version: ${{ needs.config.outputs.default }}
          gcp-workload-identity-provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          gcp-service-account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          # Measure an optimized _core; a debug build would make instruction counts meaningless.
          release: "true"

      - name: Install Valgrind
        run: sudo apt-get update && sudo apt-get install -y valgrind

      - name: Benchmark current build (full suite)
        # No --output: the harness names the file after the version in pyproject.toml (2.0.0.json).
        run: ./scripts/performance

      - name: Benchmark baseline (flama ${{ env.OLD_VERSION }}, overlapping subset)
        run: |
          set -euo pipefail

          # Features added after the baseline release (MCP, decoder, compression, streaming,
          # serialize v2, schema/openapi changes) don't exist there, so only this subset is comparable.
          overlap="tests/performance/test_json.py \
                   tests/performance/test_routing.py \
                   tests/performance/test_injection.py \
                   tests/performance/test_middleware.py"

          # Isolated tree with the tests but NO local flama/ source, so `import flama` resolves to the
          # pinned PyPI install instead of the repo (which would shadow it on sys.path).
          work=/tmp/bench-old
          rm -rf "$work" && mkdir -p "$work/tests"
          cp -r tests/performance "$work/tests/performance"

          uv venv "$work/.venv" --python "${PYVER}"
          uv pip install --python "$work/.venv" "flama==${OLD_VERSION}" pydantic httpx pytest pytest-asyncio

          # Collect only the node ids that import cleanly on the baseline version, then measure each
          # straight into baseline.json (no intermediate <version> file is kept).
          pushd "$work" >/dev/null
          ids=$("$work/.venv/bin/python" -m pytest $overlap --collect-only -q \
                  --override-ini="addopts=" -p no:xdist -p no:cacheprovider 2>/dev/null | grep "::" || true)
          if [ -z "$ids" ]; then
            echo "❌ No overlapping tests import on flama==${OLD_VERSION}" >&2
            exit 1
          fi
          FLAMA_BENCH_PYTHON="$work/.venv/bin/python" "$GITHUB_WORKSPACE/scripts/performance" \
            --output "$GITHUB_WORKSPACE/benchmarks/results/baseline.json" $ids
          popd >/dev/null

      - name: Regenerate report
        run: ./scripts/benchmark

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add benchmarks/
          git commit -m "perf: seed benchmark history (2.0.0 + baseline ${OLD_VERSION}) [skip ci]" || {
            echo "Nothing to commit."
            exit 0
          }
          git push
